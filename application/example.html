<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Toolbox Customization Codelab Demo Only</title>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script src="blockly/python_compressed.js"></script>
    <script src="script/index.js"></script>
    <script src="script/python_custom.js"></script>

    <style>
      html,
      body {
        height: 100%;
      }

      body {
        background-color: #fff;
        font-family: sans-serif;
      }

      h1 {
        font-weight: normal;
        font-size: 140%;
        margin: 10px;
      }

      #blocklyDiv {
        float: bottom;
        height: 90%;
        width: 100%;
      }
      #outputPane {
        display: flex;
        flex-direction: column;
        width: 400px;
        flex: 0 0 400px;
        overflow: auto;
        margin: 1rem;
      }
      
      #generatedCode {
        height: 50%;
        background-color: rgb(247, 240, 228);
      }
      
      #output {
        height: 50%;
      }
    </style>
  </head>

  <body onload="start()">
    <h1>Toolbox Customization Codelab === Demo Only ====</h1>
    <!-- 控制按鈕 -->
    <div class="controls">
      <button id="saveButton" class="btn-primary">輸出 python </button>
    </div>
    <div id="outputPane">
      <pre id="generatedCode"><code></code></pre>
      <div id="output"></div>
    </div>
    <div id="blocklyDiv"></div>
  </body>
</html>
